name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: CLI 스모크
        run: |
          node dist/index.js --version
          node dist/index.js run "echo ci-smoke" 2>/dev/null
          node dist/index.js block last --json 2>/dev/null | node -e "
            let s=''; process.stdin.on('data',d=>s+=d).on('end',()=>{
              const b=JSON.parse(s);
              if (b.exit_code!==0 || !b.output.includes('ci-smoke')) process.exit(1);
              console.log('스모크 OK:', b.block_id);
            })"
